<html lang="en">
<head>
<meta charset="UTF-8">
<title>VULNTrack Company — Issue &amp; Vulnerability Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --critical: #c0392b; --high: #e67e22; --medium: #f1c40f;
    --low: #27ae60; --info: #7f8c8d; --bg: #0f172a; --panel: #1e293b;
    --text: #e2e8f0; --accent: #38bdf8;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 24px; }
  h1 { font-size: 20px; margin-bottom: 2px; }
  .sub { color: #94a3b8; margin-bottom: 20px; font-size: 13px; }
  .panel { background: var(--panel); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  input, select, textarea, button { background: #0f172a; color: var(--text); border: 1px solid #334155; border-radius: 6px; padding: 7px 10px; font-size: 13px; }
  textarea { width: 100%; min-height: 60px; }
  button { cursor: pointer; background: var(--accent); color: #06202f; font-weight: 600; border: none; }
  button.secondary { background: #334155; color: var(--text); }
  button.danger { background: var(--critical); color: white; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #334155; }
  th { cursor: pointer; color: #94a3b8; font-weight: 600; user-select: none; }
  th:hover { color: var(--accent); }
  tr:hover { background: #24324a; }
  .badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; color: #06202f; }
  .sev-Critical { background: var(--critical); color: white; }
  .sev-High { background: var(--high); }
  .sev-Medium { background: var(--medium); }
  .sev-Low { background: var(--low); }
  .sev-Informational { background: var(--info); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 3px; }
  .field { margin-bottom: 10px; }
  #modal-backdrop { display:none; position: fixed; inset:0; background: rgba(0,0,0,.6); align-items: center; justify-content: center; }
  #modal { background: var(--panel); padding: 20px; border-radius: 10px; width: 560px; max-height: 85vh; overflow-y: auto; }
  .stat { display:inline-block; margin-right: 18px; }
  .stat b { font-size: 18px; display:block; }
  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color:#06202f; padding: 10px 16px; border-radius: 8px; display:none; font-weight:600; }
  .pager { display:flex; gap:8px; align-items:center; margin-top: 10px; }
  .errlist { color: #fca5a5; font-size: 12px; }
</style>
</head>
<body>

<h1>🛡️ Issue &amp; Vulnerability Tracker — VULNTrack Company</h1>
<div class="sub">Backend: Flask REST API · Frontend: vanilla HTML/JS</div>

<div class="panel" id="summary-panel"></div>

<div class="panel">
  <div class="row">
    <input id="search" placeholder="Search title/description…" style="width:220px">
    <select id="filter-status"><option value="">All statuses</option></select>
    <select id="filter-severity"><option value="">All severities</option></select>
    <select id="filter-type"><option value="">All types</option></select>
    <button class="secondary" onclick="loadIssues()">Apply</button>
    <button class="secondary" onclick="clearFilters()">Clear</button>
    <span style="flex:1"></span>
    <button onclick="exportCsv()">⬇ Export CSV</button>
    <button onclick="openCreateModal()">+ New Issue</button>
  </div>
</div>

<div class="panel">
  <table>
    <thead>
      <tr>
        <th onclick="setSort('id')">ID</th>
        <th onclick="setSort('title')">Title</th>
        <th>Type</th>
        <th onclick="setSort('severity')">Severity</th>
        <th onclick="setSort('cvss_score')">CVSS</th>
        <th onclick="setSort('status')">Status</th>
        <th>Asset</th>
        <th onclick="setSort('date_reported')">Reported</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="issue-rows"></tbody>
  </table>
  <div class="pager">
    <button class="secondary" onclick="prevPage()">◀ Prev</button>
    <span id="page-label"></span>
    <button class="secondary" onclick="nextPage()">Next ▶</button>
  </div>
</div>

<div id="modal-backdrop">
  <div id="modal"></div>
</div>
<div id="toast"></div>

<script>
const API_BASE = "http://127.0.0.1:5000/api";
const API_KEY = "vuln-track-sa121417"; // matches backend VULNTRACK_API_KEY default

let META = { item_types: [], severities: [], statuses: [] };
let state = { page: 1, per_page: 10, sort_by: "date_reported", order: "desc", total: 0 };

async function api(path, opts = {}) {
  const headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
  if (opts.method && opts.method !== "GET") headers["X-API-Key"] = API_KEY;
  const res = await fetch(API_BASE + path, Object.assign({}, opts, { headers }));
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw { status: res.status, body };
  return body;
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => (t.style.display = "none"), 2500);
}

async function loadMeta() {
  META = await api("/meta");
  fillSelect("filter-status", META.statuses, true);
  fillSelect("filter-severity", META.severities, true);
  fillSelect("filter-type", META.item_types, true);
}

function fillSelect(id, values, keepFirst) {
  const el = document.getElementById(id);
  const existing = keepFirst ? [el.firstElementChild] : [];
  el.innerHTML = "";
  existing.forEach(o => el.appendChild(o));
  values.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    el.appendChild(opt);
  });
}

function setSort(field) {
  if (state.sort_by === field) state.order = state.order === "asc" ? "desc" : "asc";
  else { state.sort_by = field; state.order = "asc"; }
  loadIssues();
}

function clearFilters() {
  document.getElementById("search").value = "";
  document.getElementById("filter-status").value = "";
  document.getElementById("filter-severity").value = "";
  document.getElementById("filter-type").value = "";
  loadIssues();
}

function prevPage() { if (state.page > 1) { state.page--; loadIssues(); } }
function nextPage() {
  if (state.page * state.per_page < state.total) { state.page++; loadIssues(); }
}

async function loadIssues() {
  const params = new URLSearchParams();
  const q = document.getElementById("search").value.trim();
  const status = document.getElementById("filter-status").value;
  const severity = document.getElementById("filter-severity").value;
  const item_type = document.getElementById("filter-type").value;
  if (q) params.set("q", q);
  if (status) params.set("status", status);
  if (severity) params.set("severity", severity);
  if (item_type) params.set("item_type", item_type);
  params.set("sort_by", state.sort_by);
  params.set("order", state.order);
  params.set("page", state.page);
  params.set("per_page", state.per_page);

  const data = await api("/issues?" + params.toString());
  state.total = data.total;
  renderRows(data.items);
  document.getElementById("page-label").textContent =
    `Page ${data.page} · ${data.total} total`;
}

function renderRows(items) {
  const tbody = document.getElementById("issue-rows");
  tbody.innerHTML = "";
  items.forEach(i => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>#${i.id}</td>
      <td>${escapeHtml(i.title)}</td>
      <td>${i.item_type}</td>
      <td><span class="badge sev-${i.severity}">${i.severity}</span></td>
      <td>${i.cvss_score ?? "—"}</td>
      <td>${i.status}</td>
      <td>${escapeHtml(i.affected_asset)}</td>
      <td>${new Date(i.date_reported).toLocaleDateString()}</td>
      <td>
        <button class="secondary" onclick="openEditModal(${i.id})">Edit</button>
        <button class="danger" onclick="deleteIssue(${i.id})">Del</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s ?? "";
  return d.innerHTML;
}

async function deleteIssue(id) {
  if (!confirm(`Delete issue #${id}? This cannot be undone.`)) return;
  try {
    await api(`/issues/${id}`, { method: "DELETE" });
    toast("Issue deleted");
    loadIssues(); loadSummary();
  } catch (e) { toast("Error: " + (e.body?.error || "delete failed")); }
}

function closeModal() { document.getElementById("modal-backdrop").style.display = "none"; }

function openCreateModal() { renderForm(null); }

async function openEditModal(id) {
  const issue = await api(`/issues/${id}`);
  renderForm(issue);
}

function renderForm(issue) {
  const isEdit = !!issue;
  const opts = (arr, current) => arr.map(v =>
    `<option value="${v}" ${v === current ? "selected" : ""}>${v}</option>`).join("");

  document.getElementById("modal").innerHTML = `
    <h3>${isEdit ? "Edit Issue #" + issue.id : "New Issue"}</h3>
    <div class="field"><label>Title *</label>
      <input id="f-title" style="width:100%" value="${issue ? escapeHtml(issue.title) : ""}"></div>
    <div class="field"><label>Description *</label>
      <textarea id="f-description">${issue ? escapeHtml(issue.description) : ""}</textarea></div>
    <div class="grid2">
      <div class="field"><label>Type *</label>
        <select id="f-type" style="width:100%">${opts(META.item_types, issue?.item_type)}</select></div>
      <div class="field"><label>Severity *</label>
        <select id="f-severity" style="width:100%">${opts(META.severities, issue?.severity)}</select></div>
      <div class="field"><label>CVSS Score (0-10, required for Vulnerability)</label>
        <input id="f-cvss" type="number" step="0.1" min="0" max="10" style="width:100%" value="${issue?.cvss_score ?? ""}"></div>
      <div class="field"><label>CVE ID (optional, CVE-YYYY-NNNN)</label>
        <input id="f-cve" style="width:100%" value="${issue?.cve_id ?? ""}"></div>
      <div class="field"><label>Status</label>
        <select id="f-status" style="width:100%">${opts(META.statuses, issue?.status || "Open")}</select></div>
      <div class="field"><label>Affected Asset *</label>
        <input id="f-asset" style="width:100%" value="${issue ? escapeHtml(issue.affected_asset) : ""}"></div>
      <div class="field"><label>Reporter *</label>
        <input id="f-reporter" style="width:100%" value="${issue ? escapeHtml(issue.reporter) : ""}"></div>
      <div class="field"><label>Assignee</label>
        <input id="f-assignee" style="width:100%" value="${issue?.assignee ?? ""}"></div>
    </div>
    <div class="field"><label>Remediation Notes</label>
      <textarea id="f-remediation">${issue?.remediation_notes ?? ""}</textarea></div>
    <div id="form-errors" class="errlist"></div>
    <div class="row" style="margin-top:10px">
      <button onclick="submitForm(${issue ? issue.id : "null"})">${isEdit ? "Save Changes" : "Create Issue"}</button>
      <button class="secondary" onclick="closeModal()">Cancel</button>
    </div>
  `;
  document.getElementById("modal-backdrop").style.display = "flex";
}

async function submitForm(id) {
  const payload = {
    title: document.getElementById("f-title").value,
    description: document.getElementById("f-description").value,
    item_type: document.getElementById("f-type").value,
    severity: document.getElementById("f-severity").value,
    status: document.getElementById("f-status").value,
    affected_asset: document.getElementById("f-asset").value,
    reporter: document.getElementById("f-reporter").value,
    assignee: document.getElementById("f-assignee").value,
    remediation_notes: document.getElementById("f-remediation").value,
  };
  const cvss = document.getElementById("f-cvss").value;
  const cve = document.getElementById("f-cve").value;
  if (cvss !== "") payload.cvss_score = parseFloat(cvss);
  if (cve !== "") payload.cve_id = cve;

  try {
    if (id) await api(`/issues/${id}`, { method: "PUT", body: JSON.stringify(payload) });
    else await api("/issues", { method: "POST", body: JSON.stringify(payload) });
    closeModal();
    toast(id ? "Issue updated" : "Issue created");
    loadIssues(); loadSummary();
  } catch (e) {
    const errs = e.body?.errors || [e.body?.error || "Something went wrong"];
    document.getElementById("form-errors").innerHTML = errs.join("<br>");
  }
}
